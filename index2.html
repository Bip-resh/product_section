<!DOCTYPE html>
<htm lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="taskstyle3.css">
</head>
<body>
    <div class="div-container">
        <p class="title">Products</p>
        <div class="product-container">
            <div class="image-container"><img src="./image/2m3.jpg" ></div>
            <div class="details-container">
                <p class="details-para">Product information</p>
                <p class="details-para" id="name">Air Conditioner ❄️</p>
                <div class="price-container">
                    <p class="details-para">Price</p>
                    <p class="details-para" id="price-money">$999</p>
                    <button class="sale-button">sale</button>
                </div>
                <p class="details-para" id="color">Color</p>
                
                <div class="color-variation">
                    <input type="radio" name="color" id="white" value="white" checked>
                    <label for="white" class="white"></label>
                    <input type="radio" name="color" id="black" value="black">
                    <label for="black" class="black"></label>
                    <input type="radio" name="color" id="blue" value="blue">
                    <label for="blue" class="blue"></label>
                </div>
                <div class="quantity-container">
                    <p>Quantity</p>
                    <div class="quantity-box">
                        <button class="subtractProduct">-</button>
                        <span class="number_of_products">1</span>
                        <button class="addProduct">+</button>
                    </div>
                </div>
                
                <div class="button-container">
                    <button class="cart-button">Add to Cart</button>
                    <button class="buy-button">Buy It Now</button>
                </div>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Vitae cupiditate, iure saepe qui error commodi reiciendis
                    molestias impedit? Magnam aperiam iusto minima facilis, iure neque.</p>
            </div>
        </div>
    </div>
    <script src="taskstyle3.js"></script>
</body>
</htm
